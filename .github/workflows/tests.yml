name: tests
on:
  push:
  pull_request:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Demo-mode tests (offline)
        env:
          TEST_MODE: demo
        run: |
          python tests/run_tests.py
